      description: "An identifier for each project that is unique within a company."

    Measurement_Point_Code:
      name: mp_code
      in: path
      required: true
      schema:
        type: string
        example: "AAA-AAA"
      description: "An identifier for each measurement point that is unique within a project."

    Webhook_ID:
      name: webhook_id
      in: path
      required: true
      schema:
        type: string
        maxLength: 128
        example: "production"
      description: You can use production, staging, dev etc.. for this or some random value like uuidv4. This doesn't need to be unique across companies.
    
    Pagination_Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        format: int64
        minimum: 1
        maximum: 10000
        default: 10000
      description: The maximum number of items to return in the responses.

    Pagination_Cursor:
      name: cursor
      in: query
      required: false
      schema:
        type: string
      description: The cursor to use for keyset pagination. Omit to start from the beginning.

    Timestamp_From:
      name: from
      in: query
      required: false
      schema:
        type: string
        format: date-time
        example: "2023-01-01T12:00:00.123Z"
      description: Inclusive lower bound (items with timestamp >= this value). Omit to start from the earliest available item.

    Timestamp_To:
      name: to
      in: query
      required: false
      schema:
        type: string
        format: date-time
        example: "2024-01-01T12:00:00.123Z"
      description: Exclusive upper bound (items with timestamp < this value). Omit for an open-ended range.
