        - count

  responses:
    Unauthorized_Error:
      description: Unauthorized access
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error_Response'

    Not_Found_Error:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error_Response'

    Too_Many_Requests_Error:
      description: You are requesting data too fast, please reduce the request rate.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error_Response'

    Internal_Server_Error:
      description: Retry the request after a while, if the error persists for some time contact us.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error_Response'

    Service_Temporarily_Unavailable:
      description: Retry the request after a while, if the error persists for some time contact us. Has a higher chance than 500 internal server error of being a temporary issue.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error_Response'

    Bad_Gateway:
      description: Similar to 503 Service_Temporarily_Unavailable, avoid any assumptions regarding the format of the response body.

  parameters:
    Company_Code:
      name: company_code
      in: path
      required: true
      schema:
        type: string
        example: "AAA-AAA"
      description: "A unique identifier for each company."

    Project_Code:
      name: project_code
      in: path
      required: true
      schema:
        type: string
