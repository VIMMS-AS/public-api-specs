    Webhook_Retry_Config:
      type: object
      description: Configuration for retrying failed webhook deliveries (non 2xx responses). The smallest value between initial_delay_ms doubled every retry and max_delay_ms will be used as the delay between retries.
      properties:
        max_retries:
          type: integer
          format: int64
          minimum: 0
          maximum: 25
          default: 15
        initial_delay_ms:
          type: integer
          format: int64
          minimum: 5000
          maximum: 86400000
          default: 5000
        max_delay_ms:
          type: integer
          format: int64
          minimum: 5000
          maximum: 86400000
          default: 86400000


